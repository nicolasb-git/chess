<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess | Premium Experience</title>
    <meta name="description" content="A premium, modern chess game with smooth animations and elegant design.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-glow"></div>

    <main class="app-container">
        <header class="game-header">
            <h1 class="title">Grandmaster<span>Chess</span></h1>
            <div class="header-controls">
                <div class="difficulty-control">
                    <label for="difficulty-select">Difficulty</label>
                    <select id="difficulty-select" class="select-premium">
                        <option value="0">Easy</option>
                        <option value="8" selected>Medium</option>
                        <option value="15">Hard</option>
                        <option value="20">Grandmaster</option>
                    </select>
                </div>
                <div id="turn-indicator" class="turn-indicator white-turn">
                    <span class="indicator-dot"></span>
                    <span class="turn-text">White's Turn</span>
                </div>
            </div>
        </header>

        <div class="game-layout">
            <aside class="sidebar left">
                <div class="player-card white-player active">
                    <div class="avatar">W</div>
                    <div class="player-info">
                        <span class="player-name">Player 1</span>
                        <span class="player-sub">White Pieces</span>
                    </div>
                </div>
            </aside>

            <div class="board-container">
                <div id="chess-board" class="chess-board">
                    <!-- Board squares will be generated by JS -->
                </div>
            </div>

            <aside class="sidebar right">
                <div class="player-card black-player">
                    <div class="avatar">B</div>
                    <div class="player-info">
                        <span class="player-name">Player 2</span>
                        <span class="player-sub">Black Pieces</span>
                    </div>
                </div>
            </aside>
        </div>

        <footer class="game-footer">
            <div class="status-bar">
                <p id="game-status">Game Started. Good luck!</p>
            </div>
            <div class="controls">
                <button id="reset-btn" class="btn secondary">Reset Game</button>
            </div>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="pieces.js"></script>
    <script src="script.js"></script>
</body>

</html>
